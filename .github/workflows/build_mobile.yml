      #     releaseFiles: app-release-signed.aab
      #     tracks: internal
      #     status: draft
      - run: echo "TODO - sign the release AAB, then upload it with Google Play service-account credentials."

  publish-ios-draft:
    name: Publish iOS (disabled draft)
    if: ${{ false }}
    needs: ios
    runs-on: macos-15
    steps:
      # Enable this job only after adding Apple signing and App Store Connect secrets.
